[package]
name = "egomoose/react-studio-properties"
description = "React implementations of Roblox Studio properties."
repository = "https://github.com/EgoMoose/rbx-react-studio-properties"
version = "1.1.0"
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
license = "MIT"
exclude = ["**"]
include = ["src", "src/**", "wally.toml", "wally.lock", "default.project.json", "LICENSE"]

[dependencies]
Trove = "sleitnick/trove@=1.5.1"
Signal = "sleitnick/signal@2.0.3"

React = "jsdotlua/react@17.2.1"
ReactRoblox = "jsdotlua/react-roblox@17.2.1"
StudioComponents = "sircfenner/studiocomponents@1.2.0"
Lucide = "virtualbutfake/lucide-roblox@1.1.3"
ReactRipple = "littensy/react-ripple@3.0.1"

[dev-dependencies]
UILabs = "pepeeltoro41/ui-labs@2.4.2"